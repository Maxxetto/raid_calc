group 'com.revenuecat.purchases_ui_flutter'
version '9.16.0'

buildscript {
    ext.kotlin_version = '2.1.0'
    ext.common_version = '17.54.0'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.revenuecat.purchases_ui_flutter'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 24
        compileSdk 34
        // Fix variant resolution for purchases-android local builds
        missingDimensionStrategy 'apis', 'defaults'
        missingDimensionStrategy 'billingclient', 'bc8'
    }
    
    dependencies {
        implementation "com.revenuecat.purchases:purchases-hybrid-common-ui:$common_version"
        implementation 'androidx.compose.ui:ui-android:1.5.4'
    }
}
